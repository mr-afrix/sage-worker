name = "sage-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain — set this up in the Cloudflare dashboard:
# Workers & Pages → sage-api → Settings → Domains & Routes → Add Custom Domain
# Domain: api.sage.dpdns.org
routes = [
  { pattern = "api.sage.dpdns.org", custom_domain = true }
]

# KV namespace for hot cache. Create with:
#   wrangler kv namespace create CACHE
# Then paste the id below.
[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_KV_ID"

# Vars (non-secret)
[vars]
CREATOR = "Sage"
API_VERSION = "1.0.0"

# Secrets (set with `wrangler secret put <NAME>`):
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
